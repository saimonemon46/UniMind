version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: unimind
      POSTGRES_USER: alma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alma_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://alma:${POSTGRES_PASSWORD:-alma_secret}@db:5432/unimind
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai_service:8001}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-change-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
    depends_on: [db, redis]
    ports:
      - "8000:8000"

  celery_worker:
    build: ./backend
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://alma:${POSTGRES_PASSWORD:-alma_secret}@db:5432/unimind
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai_service:8001}
    depends_on: [db, redis, backend]

  celery_beat:
    build: ./backend
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://alma:${POSTGRES_PASSWORD:-alma_secret}@db:5432/unimind
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on: [db, redis, backend]

  ai_service:
    build: ./ai_service
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./ai_service:/app
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8001:8001"
    depends_on: [redis]

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on: [backend, frontend, ai_service]

volumes:
  postgres_data:

